<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Портфолио Ильи Вагина — C++ разработчика, изучающего игровые движки, графику и системное программирование." />
  <title>Илья Вагин — C++ Developer</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <main class="ide" aria-label="Портфолио C++ разработчика">
    <header class="titlebar">
      <div class="window-controls" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <strong>Weez9x Portfolio</strong>
      <span class="titlebar-file">Portfolio.sln</span>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-heading">SOLUTION EXPLORER</div>
        <div class="solution-name">▾ Portfolio</div>

        <nav class="tree" id="navigation" aria-label="Навигация по портфолио">
          <div class="tree-group">
            <div class="tree-folder">▾ Projects</div>
            <div id="projectNavigation"></div>
          </div>

          <div class="tree-group">
            <button class="tree-item static-item" data-page="about">◇ About.hpp</button>
            <button class="tree-item static-item" data-page="skills">◇ Skills.hpp</button>
            <button class="tree-item static-item" data-page="contacts">◇ Contacts.hpp</button>
          </div>
        </nav>

        <div class="sidebar-footer">
          <span class="status-dot"></span>
          <span>Открыт к предложениям</span>
        </div>
      </aside>

      <section class="editor-shell">
        <div class="tabs" id="tabs"></div>
        <article class="editor" id="editor" aria-live="polite"></article>
        <footer class="statusbar">
          <span>C++</span>
          <span>UTF-8</span>
          <span>Portfolio ready</span>
        </footer>
      </section>
    </div>
  </main>

  <script src="js/data/projects.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
